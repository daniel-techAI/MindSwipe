name: Patch MindSwipe Content And Build

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-build:
    name: Apply content update and build Android
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply MindSwipe content update
        shell: pwsh
        run: |
          function Write-GzipBase64File([string]$Path, [string]$Data) {
            $clean = $Data -replace '\s', ''
            $bytes = [Convert]::FromBase64String($clean)
            $inputStream = [IO.MemoryStream]::new($bytes)
            $gzip = [IO.Compression.GzipStream]::new($inputStream, [IO.Compression.CompressionMode]::Decompress)
            $output = [IO.MemoryStream]::new()
            $gzip.CopyTo($output)
            $gzip.Dispose()
            [IO.File]::WriteAllBytes($Path, $output.ToArray())
          }

