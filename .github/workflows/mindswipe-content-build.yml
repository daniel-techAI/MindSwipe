name: MindSwipe Content Patch Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-and-build:
    name: Patch app and build Android
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply MindSwipe content update
        shell: bash
        run: |
          base64 -d tools/mindswipe-app.jsx.gz.b64 | gzip -d > src/App.jsx
          base64 -d tools/mindswipe-app-shell.css.gz.b64 | gzip -d > src/app-shell.css
          rm -f tools/mindswipe-app.jsx.gz.b64 tools/mindswipe-app-shell.css.gz.b64 .github/workflows/mindswipe-content-build.yml

      - name: Commit updated app files
        run: |
          git config user.name "MindSwipe Bot"
          git config user.email "actions@github.com"
          git add src/App.jsx src/app-shell.css tools/mindswipe-app.jsx.gz.b64 tools/mindswipe-app-shell.css.gz.b64 .github/workflows/mindswipe-content-build.yml
          git commit -m "Improve onboarding interests and streak quiz"
          git push

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Generate Android project
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Add Android notification permissions
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("android/app/src/main/AndroidManifest.xml")
          text = path.read_text()
          marker = '<manifest xmlns:android="http://schemas.android.com/apk/res/android">'
          permissions = [
              '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
              '    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />',
          ]

          if marker not in text:
              raise SystemExit("Android manifest marker not found")

          additions = "\n".join(permission for permission in permissions if permission not in text)
          if additions:
              text = text.replace(marker, f"{marker}\n{additions}", 1)
              path.write_text(text)
          PY

      - name: Build debug APK and AAB
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug bundleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MindSwipe-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: MindSwipe-debug-aab
          path: android/app/build/outputs/bundle/debug/app-debug.aab
