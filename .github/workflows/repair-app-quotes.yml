name: Repair App Quotes

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace bad quote characters
        shell: pwsh
        run: |
          $path = 'src/App.jsx'
          $text = Get-Content $path -Raw
          $fixed = $text.Replace([char]127, [char]39)
          if ($fixed -eq $text) {
            Write-Host 'No bad quote characters found.'
            exit 0
          }
          Set-Content -Path $path -Value $fixed -NoNewline
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add $path
          git commit -m 'Repair App JSX quote characters'
          git push
