          session_motion_css = r'''.sessionCard {
  position: relative;
  overflow: hidden;
  min-height: min(68vh, 620px);
  padding: clamp(18px, 5vw, 24px);
  touch-action: none;
  transform: translate3d(var(--drag-x, 0), var(--drag-y, 0), 0) rotate(var(--drag-rotate, 0deg));
  transition: transform 150ms cubic-bezier(.2, .9, .2, 1), opacity 180ms ease, border-color 160ms ease, box-shadow 160ms ease;
  user-select: none;
}

.sessionCard::before {
  position: absolute;
  inset: 0;
