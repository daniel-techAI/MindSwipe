'''
          css = replace_between(css, '.sessionCard {\n  position: relative;', '\n.gestureGuide {', session_motion_css, 'session motion css')

          required_app = ['const swipeActionMeta', 'handleCardPointerStart', 'sessionComplete', 'completeStats', 'quizTopline']
          required_css = ['.completePanel', '.quizTopline', '.actionFlash', 'var(--drag-x']
          missing = [item for item in required_app if item not in app] + [item for item in required_css if item not in css]
          if missing:
              raise SystemExit('Missing expected markers after patch: ' + ', '.join(missing))

          app_path.write_text(app)
          css_path.write_text(css)
          PY
          rm -f .github/workflows/mindswipe-core-loop-build.yml

      - name: Commit refined core loop
        run: |
          git config user.name "MindSwipe Bot"
          git config user.email "actions@github.com"
          git add -A src/App.jsx src/app-shell.css .github/workflows/mindswipe-core-loop-build.yml
          git commit -m "Refine MindSwipe core loop"
          git push

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Generate Android project
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Add Android notification permissions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("android/app/src/main/AndroidManifest.xml")
          text = path.read_text()
          marker = '<manifest xmlns:android="http://schemas.android.com/apk/res/android">'
          permissions = [
              '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
              '    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />',
          ]
          if marker not in text:
              raise SystemExit("Android manifest marker not found")
          additions = "\n".join(permission for permission in permissions if permission not in text)
          if additions:
              text = text.replace(marker, f"{marker}\n{additions}", 1)
              path.write_text(text)
          PY

      - name: Build debug APK and AAB
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug bundleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
