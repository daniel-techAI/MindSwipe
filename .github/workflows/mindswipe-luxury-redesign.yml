name: MindSwipe Luxury Redesign

on:
  push:
    paths:
      - '.github/workflows/mindswipe-luxury-redesign.yml'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Apply luxury redesign
        env:
          CSS_GZ_B64: ""
          LOGO_GZ_B64: ""
        run: |
          python - <<'PY'
          import base64, gzip, os, pathlib, re

          root = pathlib.Path('.')
          app_path = root / 'src' / 'App.jsx'
          css_path = root / 'src' / 'app-shell.css'
          logo_path = root / 'src' / 'MindSwipeLogo.jsx'

          app = app_path.read_text(encoding='utf-8')
          app = app.replace("<span className='miniMetric'>{progress.xp} XP</span>", "<span className='miniMetric'>Level {getLevelFromXp(progress.xp)}</span>")
          app = app.replace("<button className='bigStart' onClick={() => startSession(activeMood)}>Start</button>", "<button className='bigStart' onClick={() => startSession(activeMood)}>\n          <span>Start</span>\n          <small>A new swipe</small>\n        </button>")
          app_path.write_text(app, encoding='utf-8')

          logo = gzip.decompress(base64.b64decode(os.environ['LOGO_GZ_B64'])).decode('utf-8')
          logo_path.write_text(logo, encoding='utf-8')

          css = css_path.read_text(encoding='utf-8')
          marker = '/* Brabus luxury pass: black lacquer, oxblood glass, champagne trim. */'
          if marker in css:
              css = css[:css.index(marker)].rstrip() + '\n'
          override = gzip.decompress(base64.b64decode(os.environ['CSS_GZ_B64'])).decode('utf-8')
          css_path.write_text(css.rstrip() + '\n\n' + override.rstrip() + '\n', encoding='utf-8')

          for path in [app_path, css_path, logo_path]:
              text = path.read_text(encoding='utf-8')
              opens = text.count('{')
              closes = text.count('}')
              non_ascii = sum(1 for ch in text if ord(ch) > 127)
              print(f'{path}: braces {opens}/{closes}, non-ascii {non_ascii}, length {len(text)}')
              if opens != closes:
                  raise SystemExit(f'brace mismatch in {path}')
              if non_ascii:
                  raise SystemExit(f'non-ascii found in {path}')
          PY
      - name: Commit source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/mindswipe-luxury-redesign.yml
          git add src/App.jsx src/app-shell.css src/MindSwipeLogo.jsx
          git status --short
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Redesign app with luxury visual system"
            git push
          fi
