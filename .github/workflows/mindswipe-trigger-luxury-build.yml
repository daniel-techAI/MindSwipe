name: MindSwipe Trigger Luxury Build

on:
  push:
    paths:
      - '.github/workflows/mindswipe-trigger-luxury-build.yml'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Remove temporary trigger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/mindswipe-trigger-luxury-build.yml
          git commit -m "Remove luxury build trigger workflow"
          git push
