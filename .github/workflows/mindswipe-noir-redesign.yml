name: MindSwipe Noir Redesign

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/mindswipe-noir-redesign.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  redesign-and-build:
    name: Apply premium noir redesign and build Android
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply redesign stylesheet layer
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64

          css_path = Path('src/app-shell.css')
          marker = '/* Premium noir redesign: warm paper, oxblood, antique gold. */'
          override = base64.b64decode('''''' ).decode('utf-8')

          css = css_path.read_text()
          if marker in css:
              css = css[:css.index(marker)].rstrip() + '\n\n' + override.rstrip() + '\n'
          else:
              css = css.rstrip() + '\n\n' + override.rstrip() + '\n'
          css_path.write_text(css)

          for workflow in [
              Path('.github/workflows/mindswipe-noir-redesign.yml'),
              Path('.github/workflows/mindswipe-fix-section-build.yml'),
              Path('.github/workflows/mindswipe-sections-polish.yml'),
              Path('.github/workflows/mindswipe-sections-runner.yml'),
          ]:
              if workflow.exists():
                  workflow.unlink()
          PY

      - name: Commit redesign
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app-shell.css .github/workflows
          if git diff --cached --quiet; then
            echo "No redesign changes to commit."
          else
            git commit -m "Apply premium noir MindSwipe redesign"
            git push
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Generate Android project
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Add Android notification permissions
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('android/app/src/main/AndroidManifest.xml')
          text = path.read_text()
          marker = '<manifest xmlns:android="http://schemas.android.com/apk/res/android">'
          permissions = [
              '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
              '    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />',
          ]

          if marker not in text:
              raise SystemExit('Android manifest marker not found')

          additions = '\n'.join(permission for permission in permissions if permission not in text)
          if additions:
              text = text.replace(marker, f'{marker}\n{additions}', 1)
              path.write_text(text)
          PY

      - name: Build debug APK and AAB
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug bundleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MindSwipe-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: MindSwipe-debug-aab
          path: android/app/build/outputs/bundle/debug/app-debug.aab
