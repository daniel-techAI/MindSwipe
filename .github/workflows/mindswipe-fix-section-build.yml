name: Fix section polish build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/mindswipe-fix-section-build.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  fix-and-build:
    name: Fix JSX copy and build Android
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch section polish copy
        run: |
          python3 - <<'PY'
          from pathlib import Path

          app_path = Path('src/App.jsx')
          text = app_path.read_text()
          old = "aria-label='Choose today's mood'"
          new = "aria-label=\"Choose today's mood\""
          if old not in text and new not in text:
              raise SystemExit('Mood aria label target not found')
          text = text.replace(old, new, 1)
          app_path.write_text(text)

          for workflow in [
              Path('.github/workflows/mindswipe-fix-section-build.yml'),
              Path('.github/workflows/mindswipe-sections-polish.yml'),
              Path('.github/workflows/mindswipe-sections-runner.yml'),
          ]:
              if workflow.exists():
                  workflow.unlink()
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.jsx .github/workflows
          if git diff --cached --quiet; then
            echo "No source changes to commit."
          else
            git commit -m "Fix section polish build"
            git push
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Generate Android project
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Add Android notification permissions
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('android/app/src/main/AndroidManifest.xml')
          text = path.read_text()
          marker = '<manifest xmlns:android="http://schemas.android.com/apk/res/android">'
          permissions = [
              '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
              '    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />',
          ]

          if marker not in text:
              raise SystemExit('Android manifest marker not found')

          additions = '\n'.join(permission for permission in permissions if permission not in text)
          if additions:
              text = text.replace(marker, f'{marker}\n{additions}', 1)
              path.write_text(text)
          PY

      - name: Build debug APK and AAB
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug bundleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MindSwipe-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: MindSwipe-debug-aab
          path: android/app/build/outputs/bundle/debug/app-debug.aab
